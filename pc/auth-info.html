<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FPT 数字证书认证信息 — NotaSign</title>
<link rel="stylesheet" href="../fpt-design.css"/>
<script src="../fpt-common.js" defer></script>
</head>
<body class="page-modal-only">

<!-- FPT 认证信息弹窗（仅蒙层 + 弹窗） -->
<div class="ovl ovl--fullpage" id="ovl-auth">
<div class="modal" id="modal-fpt-auth" role="dialog" aria-modal="true" aria-labelledby="mt-fpt-auth">

<div class="modal-h">
<h2 class="modal-tt" id="mt-fpt-auth">FPT 数字证书认证信息</h2>
<button class="modal-x" type="button" aria-label="关闭" id="mclose-auth">
<svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
</button>
</div>

<div class="modal-stack">
<div class="m4-body">
<p class="m4-desc">请确认用于申请 FPT 短期数字证书的身份信息。提交后将跳转至 FPT SIC Web 完成证件照片上传与人脸识别。</p>

<div class="m4-frow"><div class="m4-fcol">
<span class="m4-label">证件姓名</span>
<input type="text" class="m4-inp m4-inp--field" placeholder="请输入证件姓名"/>
</div></div>

<div class="m4-frow"><div class="m4-fcol">
<span class="m4-label">证件类型</span>
<div class="swrap" data-value="personal-id">
<button type="button" class="strg" aria-haspopup="listbox" aria-expanded="false">
<span class="strg-v">Personal ID / 个人身份号码</span>
<svg class="strg-c" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4.5 6L8 9.5L11.5 6" stroke="#A2A1A9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>
<div class="smen" role="listbox" hidden>
<button type="button" class="sopt is-sel" role="option" data-value="personal-id" aria-selected="true"><span>Personal ID / 个人身份号码</span></button>
<button type="button" class="sopt" role="option" data-value="citizen-id" aria-selected="false"><span>Citizen ID / 公民身份证</span></button>
<button type="button" class="sopt" role="option" data-value="passport" aria-selected="false"><span>Passport / 护照</span></button>
</div></div>
</div></div>

<div class="m4-frow"><div class="m4-fcol">
<span class="m4-label">证件 ID</span>
<input type="text" class="m4-inp m4-inp--field" placeholder="请输入证件号码"/>
</div></div>

<div class="m4-section-tight">
<span class="m4-mlabel">认证联系方式</span>
<div class="m4-mrow">
<div class="m4-mcard is-sel" role="radio" aria-checked="true" tabindex="0" data-fpt-method="email">
<div class="m4-mradio"><div class="m4-mr-outer"><div class="m4-mr-inner"></div></div></div>
<span class="m4-mtxt">邮箱</span></div>
<div class="m4-mcard" role="radio" aria-checked="false" tabindex="0" data-fpt-method="phone">
<div class="m4-mradio"><div class="m4-mr-outer"><div class="m4-mr-inner"></div></div></div>
<span class="m4-mtxt">手机</span></div>
</div></div>

<div class="m4-frow" data-fpt-email-field><div class="m4-fcol">
<span class="m4-label">邮箱地址</span>
<input type="email" class="m4-inp m4-inp--field" placeholder="请输入邮箱地址"/>
</div></div>

<div class="m4-frow" data-fpt-phone-field hidden><div class="m4-fcol">
<span class="m4-label">手机号码</span>
<div class="m4-phone-combo">
<span class="m4-phone-combo__prefix" aria-hidden="true">+84</span>
<input type="tel" class="m4-phone-combo__input" placeholder="请输入手机号码" aria-label="手机号码"/>
</div></div></div>

</div>

<div class="modal-f">
<a href="signing.html" class="btn btn-s" id="btn-cancel-auth">取消</a>
<a href="cert-querying.html" class="btn btn-p btn-w130">继续认证</a>
</div>

</div>

</div></div>

<script>
document.getElementById('mclose-auth').addEventListener('click',function(){window.location.href='signing.html'});
document.getElementById('btn-cancel-auth').addEventListener('click',function(e){
  e.preventDefault();
  window.location.href='signing.html';
});
document.getElementById('modal-fpt-auth').addEventListener('click',function(e){e.stopPropagation()});
</script>
</body>
</html>
